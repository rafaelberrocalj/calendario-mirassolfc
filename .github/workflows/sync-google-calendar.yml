name: 📅 Sincronizar Google Calendar

concurrency:
  group: sync-google-calendar
  cancel-in-progress: false

on:
  schedule:
    # Roda diariamente às 23:30 de Brasília (02:30 UTC)
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-calendar:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Rodar testes locais
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      - name: 🔐 Configurar Service Account (GitHub Secret)
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$SERVICE_ACCOUNT_KEY" > service-account.json
          echo "✅ Service Account key escrito"

      - name: 🔍 Executar Scraper
        run: |
          python scraper.py
          echo "✅ Scraper executado com sucesso"

      - name: 📱 Sincronizar com Google Calendar
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
          SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
        run: |
          python calendar_cli.py update
          echo "✅ Calendário sincronizado via calendar_cli.py"



      - name: 🧹 Limpar credenciais
        if: always()
        run: |
          rm -f service-account.json
          echo "✅ Credenciais removidas (segurança)"

      - name: 📝 Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name: 📤 Fazer commit de mudanças
        run: |
          git add mirassolfc.ics || true

          if git diff --staged --quiet; then
            echo "📭 Nenhuma mudança no calendário — nada para commitar"
          else
            git commit -m "📅 Atualização automática do calendário [skip ci]"
            echo "✅ Commit realizado"
          fi
      
      - name: 🚀 Push para repositório
        run: |
          git push || echo "Nada para fazer push"
          echo "✅ Push concluído"
      
      - name: ✨ Sucesso!
        run: |
          echo "🎉 Sincronização completa!"
          echo "✅ Scraper executado"
          echo "✅ Calendário sincronizado"
          echo "✅ Mudanças enviadas"
